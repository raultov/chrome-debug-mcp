[package]
name = "chrome-control-mcp"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/raultov/chrome-control-mcp"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
cdp-lite = "0.1.1"
rust-mcp-sdk = "0.8.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.50.0", features = ["full"] }
tokio-stream = "0.1.18"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
